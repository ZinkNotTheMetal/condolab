---
- name: Assert Docker is only installed on Debian hosts
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'Debian'
      - ansible_facts['distribution'] == 'Debian'
    fail_msg: This Docker role currently supports Debian only.

- name: Remove conflicting Docker packages
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-doc
      - docker-compose
      - docker-compose-v2
      - podman-docker
      - containerd
      - runc
    state: absent

- name: Install Docker repository prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: true

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Download Docker apt repository key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: '0644'

- name: Configure Docker apt repository
  ansible.builtin.deb822_repository:
    name: docker
    types:
      - deb
    uris:
      - https://download.docker.com/linux/debian
    suites:
      - "{{ ansible_facts['distribution_release'] }}"
    components:
      - stable
    architectures:
      - "{{ docker_dpkg_architecture_map[ansible_facts['architecture']] | default(ansible_facts['architecture']) }}"
    signed_by: /etc/apt/keyrings/docker.asc
    state: present

- name: Refresh apt package cache after adding Docker repository
  ansible.builtin.apt:
    update_cache: true

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
      - python3-docker
    state: present

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Add Docker users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ bootstrap_admin_users }}"
  when: bootstrap_admin_users | length > 0

- name: Assert Docker IPVLAN subnet is defined when enabled
  ansible.builtin.assert:
    that:
      - docker_ipvlan_subnet | length > 0
    fail_msg: docker_ipvlan_subnet must be set when docker_ipvlan_enabled is true.
  when: docker_ipvlan_enabled | bool

- name: Resolve Docker IPVLAN parent from active ethernet interface
  ansible.builtin.set_fact:
    docker_ipvlan_parent: "{{ item }}"
  loop: "{{ ansible_facts.interfaces | default([]) }}"
  when:
    - docker_ipvlan_enabled | bool
    - docker_ipvlan_parent | length == 0
    - item != 'lo'
    - item is match('^en')
    - ansible_facts[item] is defined
    - ansible_facts[item].active | default(false)
  loop_control:
    label: "{{ item }}"

- name: Assert Docker IPVLAN parent interface is resolved
  ansible.builtin.assert:
    that:
      - docker_ipvlan_parent | length > 0
    fail_msg: No active ethernet interface was found for docker_ipvlan_parent.
  when: docker_ipvlan_enabled | bool

- name: Create Docker IPVLAN L3 network
  community.docker.docker_network:
    name: "{{ docker_ipvlan_name }}"
    driver: ipvlan
    driver_options:
      parent: "{{ docker_ipvlan_parent }}"
      ipvlan_mode: "{{ docker_ipvlan_mode }}"
    ipam_config:
      - subnet: "{{ docker_ipvlan_subnet }}"
    state: present
  when: docker_ipvlan_enabled | bool
