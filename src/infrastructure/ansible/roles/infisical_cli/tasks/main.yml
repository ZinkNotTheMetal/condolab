---
- name: Assert Infisical CLI role is only used on Debian hosts
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] == 'Debian'
      - ansible_facts['distribution'] == 'Debian'
    fail_msg: This Infisical CLI role currently supports Debian only.

- name: Install Infisical CLI repository prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - gnupg
    state: present
    update_cache: true

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Download Infisical apt repository key
  ansible.builtin.get_url:
    url: https://artifacts-cli.infisical.com/infisical.gpg
    dest: /etc/apt/keyrings/infisical.asc
    owner: root
    group: root
    mode: '0644'
  register: infisical_cli_repository_key

- name: Check whether Infisical keyring already exists
  ansible.builtin.stat:
    path: /etc/apt/keyrings/infisical.gpg
  register: infisical_cli_keyring

- name: Convert Infisical repository key to keyring format
  ansible.builtin.command:
    argv:
      - gpg
      - --dearmor
      - --yes
      - --output
      - /etc/apt/keyrings/infisical.gpg
      - /etc/apt/keyrings/infisical.asc
  changed_when: true
  when:
    - infisical_cli_repository_key.changed or not infisical_cli_keyring.stat.exists

- name: Configure Infisical apt repository
  ansible.builtin.deb822_repository:
    name: infisical
    types:
      - deb
    uris:
      - https://artifacts-cli.infisical.com/deb
    suites:
      - stable
    components:
      - main
    architectures:
      - >-
        {{ {'x86_64': 'amd64', 'aarch64': 'arm64'}[ansible_facts['architecture']] | default(ansible_facts['architecture']) }}
    signed_by: /etc/apt/keyrings/infisical.gpg
    state: present

- name: Refresh apt package cache after adding Infisical repository
  ansible.builtin.apt:
    update_cache: true

- name: Install Infisical CLI
  ansible.builtin.apt:
    name: infisical
    state: present
