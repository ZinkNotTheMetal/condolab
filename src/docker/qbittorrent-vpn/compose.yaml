name: qbittorrent-vpn

services:
  gluetun:
    image: qmcgaw/gluetun:v3.39.1
    container_name: qbittorrent_gluetun_vpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: private internet access
      VPN_TYPE: openvpn
      OPENVPN_USER: ${PIA_OPENVPN_USER}
      OPENVPN_PASSWORD: ${PIA_OPENVPN_PASSWORD}
      SERVER_REGIONS: ${PIA_SERVER_REGIONS:-US East}
      FIREWALL: on
      FIREWALL_OUTBOUND_SUBNETS: ${GLUETUN_FIREWALL_OUTBOUND_SUBNETS:-192.168.0.0/24,192.168.200.0/24}
      HEALTH_TARGET_ADDRESS: ${GLUETUN_HEALTH_TARGET_ADDRESS:-1.1.1.1:443}
      DOT: off
      LOG_LEVEL: ${GLUETUN_LOG_LEVEL:-info}
      TZ: ${TZ:-America/Chicago}
    volumes:
      - /condolab/docker/qbittorrent-vpn/gluetun:/gluetun
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- https://ipinfo.io | grep -q 'ip'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - qbittorrent_vpn

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent_app_ui
    restart: unless-stopped
    depends_on:
      gluetun:
        condition: service_healthy
    network_mode: service:gluetun
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-America/Chicago}
      WEBUI_PORT: 8080
    volumes:
      - /condolab/docker/qbittorrent-vpn/qbittorrent/config:/config
      - /mnt/Files/Torrent-Data:/data/downloads

networks:
  qbittorrent_vpn:
    driver: bridge
