name: monitoring-stack

services:
  loki:
    image: grafana/loki:3.7
    container_name: monitoring_loki_api
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/config.yaml
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - /condolab/docker/monitoring/loki:/loki
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:13.0.0-23826080413
    container_name: monitoring_grafana_ui
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USERNAME}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.zinkzone.tech
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - /condolab/docker/monitoring/grafana:/var/lib/grafana
    labels:
      - traefik.enable=true
      - traefik.docker.network=ipvlan
      - traefik.http.routers.grafana.rule=Host(`grafana.zinkzone.tech`)
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.routers.grafana.tls=true
      - traefik.http.routers.grafana.tls.certresolver=cloudflare
      - traefik.http.routers.grafana.middlewares=security-headers@file
      - traefik.http.services.grafana.loadbalancer.server.port=3000
    networks:
      - monitoring
      - docker_ipvlan

  alloy:
    image: grafana/alloy:v1.15
    container_name: monitoring_alloy_collector
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - monitoring

networks:
  monitoring:
    internal: true
  docker_ipvlan:
    name: ipvlan
    external: true
