name: monitoring-stack

services:
  loki:
    image: grafana/loki:3.7
    container_name: monitoring_loki_api
    restart: unless-stopped
    user: "10001:10001"
    command:
      - -config.file=/etc/loki/config.yaml
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - /condolab/docker/monitoring/loki:/loki
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:v3
    container_name: monitoring_prometheus_api
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /condolab/docker/monitoring/prometheus:/prometheus
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:13.0.0-23826080413
    container_name: monitoring_grafana_ui
    restart: unless-stopped
    user: "472:472"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USERNAME}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.zinkzone.tech
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - /condolab/docker/monitoring/grafana:/var/lib/grafana
    labels:
      - traefik.enable=true
      - traefik.docker.network=ipvlan
      - traefik.http.routers.grafana.rule=Host(`grafana.zinkzone.tech`)
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.routers.grafana.tls=true
      - traefik.http.routers.grafana.middlewares=security-headers@file
      - traefik.http.services.grafana.loadbalancer.server.port=3000
    networks:
      - monitoring
      - docker_ipvlan

  dozzle:
    image: amir20/dozzle:latest
    container_name: monitoring_dozzle_ui
    restart: unless-stopped
    environment:
      DOZZLE_HOSTNAME: ms01
      DOZZLE_NO_ANALYTICS: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /condolab/docker/monitoring/dozzle:/data
    labels:
      - traefik.enable=true
      - traefik.docker.network=ipvlan
      - traefik.http.routers.dozzle.rule=Host(`dozzle.zinkzone.tech`)
      - traefik.http.routers.dozzle.entrypoints=websecure
      - traefik.http.routers.dozzle.tls=true
      - traefik.http.routers.dozzle.middlewares=security-headers@file
      - traefik.http.services.dozzle.loadbalancer.server.port=8080
    networks:
      - monitoring
      - docker_ipvlan

  watchtower:
    image: containrrr/watchtower:latest
    container_name: monitoring_watchtower_updater
    restart: unless-stopped
    command:
      - --cleanup
      - --interval
      - "21600"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - monitoring

  alloy:
    image: grafana/alloy:v1.15.0
    container_name: monitoring_alloy_collector
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - monitoring

  node_exporter:
    image: quay.io/prometheus/node-exporter:v1.10.2
    container_name: monitoring_node_exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: monitoring_cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - monitoring

networks:
  monitoring:
    internal: true
  docker_ipvlan:
    name: ipvlan
    external: true
