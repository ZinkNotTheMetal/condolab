name: core-traefik

services:
  traefik:
    image: traefik:v3.6
    container_name: core_traefik_edge
    restart: unless-stopped
    user: "0:0"
    command:
      - --certificatesresolvers.cloudflare.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.cloudflare.acme.storage=/etc/traefik/acme/acme.json
      - --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.dnschallenge.resolvers=1.1.1.1:53,1.0.0.1:53
    environment:
      CF_DNS_API_TOKEN: ${CF_TRAEFIK_API_TOKEN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ./config:/etc/traefik/config:ro
      - /condolab/docker/traefik/certs/acme.json:/etc/traefik/acme/acme.json
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - docker_ipvlan

networks:
  docker_ipvlan:
    name: ipvlan
    external: true
