name: utility-karakeep

services:
  web:
    image: ghcr.io/karakeep-app/karakeep:release
    container_name: utility_karakeep_web
    restart: unless-stopped
    depends_on:
      chrome:
        condition: service_started
      meilisearch:
        condition: service_started
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      MEILI_ADDR: http://meilisearch:7700
      BROWSER_WEB_URL: http://chrome:9222
      OLLAMA_BASE_URL: http://ollama:11434
      NEXTAUTH_URL: ${KARAKEEP_NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${KARAKEEP_NEXTAUTH_SECRET}
    volumes:
      - /condolab/docker/karakeep/data:/data
    labels:
      - traefik.enable=true
      - traefik.docker.network=ipvlan
      - traefik.http.routers.karakeep.rule=Host(`karakeep.zinkzone.tech`)
      - traefik.http.routers.karakeep.entrypoints=websecure
      - traefik.http.routers.karakeep.tls=true
      - traefik.http.routers.karakeep.middlewares=security-headers@file
      - traefik.http.services.karakeep.loadbalancer.server.port=3000
    networks:
      - karakeep
      - docker_ipvlan

  chrome:
    image: gcr.io/zenika-hub/alpine-chrome:124
    container_name: utility_karakeep_chrome
    restart: unless-stopped
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --disable-features=AttributionReportingCrossAppWeb,ConversionMeasurement
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars
    networks:
      - karakeep
      - docker_ipvlan

  meilisearch:
    image: getmeili/meilisearch:v1.41.0
    container_name: utility_karakeep_meilisearch
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${KARAKEEP_MEILI_MASTER_KEY}
    volumes:
      - /condolab/docker/karakeep/meilisearch:/meili_data
    networks:
      - karakeep

networks:
  karakeep:
    internal: true
  docker_ipvlan:
    external: true
    name: ipvlan
